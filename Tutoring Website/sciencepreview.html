<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Science Curriculum</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
      color: #333;
    }
    h1.big {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .dropdown {
      position: relative;
      display: inline-block;
      cursor: pointer;
      user-select: none;
      padding: 10px;
      border: 1px solid #aaa;
      width: 200px;
      background: white;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      border: 1px solid #aaa;
      background: white;
      width: 100%;
      max-height: 240px;
      overflow-y: auto;
      z-index: 1;
    }
    .dropdown-content div {
      padding: 8px;
    }
    .dropdown-content div:hover {
      background: #eee;
    }
    .show {
      display: block;
    }
    #contentArea {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border: 1px solid #ccc;
      box-shadow: 1px 1px 8px rgba(0,0,0,0.1);
      max-width: 800px;
    }
    h2 {
      margin-top: 0;
    }
    h3 {
      margin: 0.75em 0 0.25em;
    }
    ul {
      margin: 0 0 1em 1.5em;
    }
  </style>
</head>
<body>
  <h1 class="big">Our Science Curriculum</h1>
  <p>At Lerno, we teach a comprehensive, NGSS‑aligned Science Curriculum from 1st through 8th grade.</p>

  <div class="dropdown" onclick="toggleDropdown()">
    <span id="dropdownLabel">Select Grade</span>
    <div id="myDropdown" class="dropdown-content">
      <div onclick="selectOption('1st Grade', event)">1st Grade</div>
      <div onclick="selectOption('2nd Grade', event)">2nd Grade</div>
      <div onclick="selectOption('3rd Grade', event)">3rd Grade</div>
      <div onclick="selectOption('4th Grade', event)">4th Grade</div>
      <div onclick="selectOption('5th Grade', event)">5th Grade</div>
      <div onclick="selectOption('6th Grade', event)">6th Grade</div>
      <div onclick="selectOption('7th Grade', event)">7th Grade</div>
      <div onclick="selectOption('8th Grade', event)">8th Grade</div>
    </div>
  </div>

  <div id="contentArea">Please select a grade above.</div>

  <script>
    function toggleDropdown() {
      document.getElementById("myDropdown").classList.toggle("show");
    }
    window.onclick = function(e) {
      if (!e.target.closest('.dropdown')) {
        document.getElementById("myDropdown").classList.remove("show");
      }
    };

    function selectOption(text, e) {
      e.stopPropagation();
      document.getElementById('dropdownLabel').textContent = text;
      document.getElementById("myDropdown").classList.remove("show");
      const c = document.getElementById('contentArea');

      if (text === '1st Grade') {
        c.innerHTML = `
          <h2>1st Grade Science</h2>
          <h3>Physical Sciences (PS)</h3>
          <ul>
            <li><strong>Sound and Light:</strong> Investigate how sound travels through different materials and how light interacts with objects (reflection, shadows).</li>
          </ul>
          <h3>Life Sciences (LS)</h3>
          <ul>
            <li><strong>Plant and Animal Structures:</strong> Identify external parts of plants and animals and explain how they help survive, grow, and meet needs.</li>
          </ul>
          <h3>Earth and Space Sciences (ESS)</h3>
          <ul>
            <li><strong>Day/Night Patterns:</strong> Observe and describe the daily pattern of the sun’s movement and the phases of the moon.</li>
          </ul>
          <h3>Engineering (ETS)</h3>
          <ul>
            <li><strong>Simple Designs:</strong> Ask questions about everyday problems and design simple solutions using tools and models.</li>
          </ul>
        `;
      }
      else if (text === '2nd Grade') {
        c.innerHTML = `
          <h2>2nd Grade Science</h2>
          <h3>Physical Sciences (PS)</h3>
          <ul>
            <li><strong>Materials and Their Properties:</strong> Test and classify materials (wood, metal, plastic) by properties like hardness and flexibility.</li>
          </ul>
          <h3>Life Sciences (LS)</h3>
          <ul>
            <li><strong>Ecosystem Relationships:</strong> Explore how plants need water/light and how animals depend on plants and other animals for food.</li>
          </ul>
          <h3>Earth and Space Sciences (ESS)</h3>
          <ul>
            <li><strong>Land and Water Change:</strong> Investigate how wind, water, and ice shape Earth's landforms over time.</li>
          </ul>
          <h3>Engineering (ETS)</h3>
          <ul>
            <li><strong>Structure Stability:</strong> Build and compare models of structures (bridges, towers) and test stability under load.</li>
          </ul>
        `;
      }
      else if (text === '3rd Grade') {
        c.innerHTML = `
          <h2>3rd Grade Science</h2>
          <h3>Physical Sciences (PS)</h3>
          <ul>
            <li><strong>Forces and Motion:</strong> Examine how balanced and unbalanced forces affect the motion of objects (push/pull).</li>
          </ul>
          <h3>Life Sciences (LS)</h3>
          <ul>
            <li><strong>Traits and Inheritance:</strong> Observe similarities/differences in offspring and how traits are passed from parents.</li>
          </ul>
          <h3>Earth and Space Sciences (ESS)</h3>
          <ul>
            <li><strong>Weather and Climate:</strong> Gather weather data (temperature, precipitation) and identify patterns over time.</li>
          </ul>
          <h3>Engineering (ETS)</h3>
          <ul>
            <li><strong>Design Problems:</strong> Define a simple design problem, specify criteria/constraints, and develop multiple solutions.</li>
          </ul>
        `;
      }
      else if (text === '4th Grade') {
        c.innerHTML = `
          <h2>4th Grade Science</h2>
          <h3>Physical Sciences (PS)</h3>
          <ul>
            <li><strong>Energy Transfers:</strong> Investigate how energy is transferred between objects (heat, light) and converted (electrical to thermal).</li>
          </ul>
          <h3>Life Sciences (LS)</h3>
          <ul>
            <li><strong>Sensory Systems:</strong> Explore how animals detect and process information from their environment (sight, sound).</li>
          </ul>
          <h3>Earth and Space Sciences (ESS)</h3>
          <ul>
            <li><strong>Earth’s Surface Changes:</strong> Examine how natural processes (volcanoes, earthquakes) and human activities alter landscapes.</li>
          </ul>
          <h3>Engineering (ETS)</h3>
          <ul>
            <li><strong>Solution Comparison:</strong> Generate multiple solutions to a problem and compare how well they meet criteria.</li>
          </ul>
        `;
      }
      else if (text === '5th Grade') {
        c.innerHTML = `
          <h2>5th Grade Science</h2>
          <h3>Physical Sciences (PS)</h3>
          <ul>
            <li><strong>Matter and Its Interactions:</strong> Investigate physical and chemical changes; classify substances by properties.</li>
          </ul>
          <h3>Life Sciences (LS)</h3>
          <ul>
            <li><strong>Ecosystem Dynamics:</strong> Understand how matter cycles and energy flows through producers, consumers, and decomposers.</li>
          </ul>
          <h3>Earth and Space Sciences (ESS)</h3>
          <ul>
            <li><strong>Earth’s Systems Interactions:</strong> Model interactions among the geosphere, hydrosphere, atmosphere, and biosphere.</li>
          </ul>
          <h3>Engineering (ETS)</h3>
          <ul>
            <li><strong>Modeling Phenomena:</strong> Develop and revise models to describe natural phenomena or test solutions.</li>
          </ul>
        `;
      }
      else if (text === '6th Grade') {
        c.innerHTML = `
          <h2>6th Grade Science</h2>
          <h3>Physical Sciences (PS)</h3>
          <ul>
            <li><strong>Energy Conservation:</strong> Explore conservation of energy in systems and energy transfer in collisions.</li>
          </ul>
          <h3>Life Sciences (LS)</h3>
          <ul>
            <li><strong>Cell Structure and Function:</strong> Compare plant and animal cells; relate cellular structures to their functions.</li>
          </ul>
          <h3>Earth and Space Sciences (ESS)</h3>
          <ul>
            <li><strong>Earth’s Water Cycle:</strong> Investigate processes like evaporation, condensation, and precipitation.</li>
          </ul>
          <h3>Engineering (ETS)</h3>
          <ul>
            <li><strong>Solution Optimization:</strong> Use criteria/constraints to optimize design solutions (e.g., water filter).</li>
          </ul>
        `;
      }
      else if (text === '7th Grade') {
        c.innerHTML = `
          <h2>7th Grade Science</h2>
          <h3>Physical Sciences (PS)</h3>
          <ul>
            <li><strong>Forces and Energy in Systems:</strong> Analyze energy conservation and transfer in macroscopic and microscopic systems.</li>
          </ul>
          <h3>Life Sciences (LS)</h3>
          <ul>
            <li><strong>Interdependent Relationships:</strong> Model how matter and energy move through ecosystems, including human impacts.</li>
          </ul>
          <h3>Earth and Space Sciences (ESS)</h3>
          <ul>
            <li><strong>Earth’s Place in the Universe:</strong> Describe Earth-Moon-Sun interactions, seasons, eclipses, and planetary motion.</li>
          </ul>
          <h3>Engineering (ETS)</h3>
          <ul>
            <li><strong>Complex Design Problems:</strong> Define criteria/constraints for larger-scale projects and evaluate competing solutions.</li>
          </ul>
        `;
      }
      else if (text === '8th Grade') {
        c.innerHTML = `
          <h2>8th Grade Science</h2>
          <h3>Physical Sciences (PS)</h3>
          <ul>
            <li><strong>Structure and Properties of Matter:</strong> Investigate atomic structure, periodic trends, and chemical reactions.</li>
          </ul>
          <h3>Life Sciences (LS)</h3>
          <ul>
            <li><strong>Evolution and Natural Selection:</strong> Examine evidence for evolution and how natural selection drives adaptation.</li>
          </ul>
          <h3>Earth and Space Sciences (ESS)</h3>
          <ul>
            <li><strong>Plate Tectonics and Earth’s Features:</strong> Model plate movements, earthquakes, volcanoes, and mountain building.</li>
          </ul>
          <h3>Engineering (ETS)</h3>
          <ul>
            <li><strong>Innovative Solutions:</strong> Use crosscutting concepts and practices to tackle real-world challenges at multiple scales.</li>
          </ul>
        `;
      }
    }
  </script>
  <script src="/path/to/supabase.js"></script>
  <script>
    const supabase = createClient('https://YOUR_PROJECT.supabase.co', 'YOUR_ANON_KEY');
  
    supabase.auth.getSession().then(({ data: { session } }) => {
      updateUI(session); // your custom UI logic
    });
  </script>
  
</body>
</html>

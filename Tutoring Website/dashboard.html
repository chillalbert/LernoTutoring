<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lerno Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: sans-serif; background: #111; color: #eee; margin: 0; padding: 0; }
  header { background: #222; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
  header h1 { margin: 0; color: #0f0; }
  .container { display: flex; flex-wrap: wrap; padding: 1rem; gap: 1rem; }
  .panel { background: #222; padding: 1rem; border-radius: 10px; flex: 1 1 300px; }
  .panel h2 { color: #0ff; }
  button { background: #0f0; border: none; padding: 0.5rem 1rem; border-radius: 5px; cursor: pointer; color: #000; margin-top: 0.5rem; }
  button:disabled { background: #555; cursor: not-allowed; }
  ul { list-style: none; padding: 0; }
  li { padding: 0.3rem 0; }
  a { color: #0f0; text-decoration: none; }
</style>
</head>
<body>

<header>
  <h1>Lerno Dashboard</h1>
  <div>
    <span id="user-points">Points: 0</span>
    <span id="user-streak" style="margin-left: 1rem;">🔥 Streak: 0</span>
  </div>
</header>

<div class="container">

  <!-- Learning Streak Panel -->
  <div class="panel" id="streak-panel">
    <h2>Learning Streak</h2>
    <div id="streak-message">Loading streak...</div>
    <button id="freeze-streak-btn">Use 50 Points for Streak Freeze</button>
  </div>

  <!-- Leaderboards Panel -->
  <div class="panel" id="leaderboard-panel">
    <h2>Leaderboards</h2>
    <h3>Global (Weekly)</h3>
    <ul id="global-leaderboard"></ul>
    <h3>Friends (Weekly)</h3>
    <ul id="friends-leaderboard"></ul>
  </div>

  <!-- Points Shop Panel -->
  <div class="panel" id="shop-panel">
    <h2>Points Shop</h2>
    <ul>
      <li>Streak Freeze - 50 Points <button onclick="buyItem('streakFreeze',50)">Buy</button></li>
      <li>15-Min Tutor Session - 200 Points <button onclick="buyItem('tutorSession',200)">Buy</button></li>
    </ul>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://jzfkcapslrnctklvjlcf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6ZmtjYXBzbHJuY3RrbHZqbGNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDcxMDY0NDgsImV4cCI6MjA2MjY4MjQ0OH0.6iNWI1dOTCbZcyATzocIlzy5ojga8UMLdbM7Dp4mi7s';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;

// --- Init Dashboard ---
async function initDashboard() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if(!user) { alert('Please log in to access the dashboard.'); return; }
  currentUser = user;

  await ensureUsername();
  await loadUserData();
  await loadLeaderboards();
}

// --- Ensure username exists ---
async function ensureUsername() {
  const { data, error } = await supabaseClient.from('users').select('username').eq('id', currentUser.id).single();
  if(error) return console.error(error);

  if(!data.username) {
    let username = '';
    while(!username) { username = prompt("Please enter a username for leaderboards:"); if(!username) alert("Username cannot be empty!"); }
    const { error: updateError } = await supabaseClient.from('users').update({ username }).eq('id', currentUser.id);
    if(updateError) return console.error(updateError);
  }
}

// --- Load User Data ---
async function loadUserData() {
  const { data, error } = await supabaseClient.from('users').select('points, streak, streak_freeze').eq('id', currentUser.id).single();
  if(error) return console.error(error);

  const points = data.points || 0;
  const streak = data.streak || 0;
  const freezeAvailable = data.streak_freeze || false;

  document.getElementById('user-points').innerText = `Points: ${points}`;
  document.getElementById('user-streak').innerText = `🔥 Streak: ${streak}`;
  
  document.getElementById('streak-message').innerText =
    streak >= 5 ? `Awesome! You're on a ${streak}-day streak!` : `Keep going! Your current streak is ${streak} days.`;

  document.getElementById('freeze-streak-btn').disabled = points < 50 || freezeAvailable;
}

// --- Load Leaderboards (Weekly Points) ---
async function loadLeaderboards() {
  const oneWeekAgo = new Date();
  oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
  const isoWeekAgo = oneWeekAgo.toISOString();

  // --- Global Weekly Leaderboard ---
  const { data: globalData, error: gError } = await supabaseClient
    .from('points_log')
    .select('user_id, points, users(username)')
    .gte('created_at', isoWeekAgo)
    .order('points', { ascending: false });

  if(gError) return console.error(gError);

  // Sum points per user
  const globalMap = {};
  globalData.forEach(p => { globalMap[p.user_id] = (globalMap[p.user_id] || 0) + p.points; });
  
  // Convert to array with username
  const globalArray = Object.keys(globalMap).map(id => {
    const entry = globalData.find(p => p.user_id === id);
    return { id, username: entry.users.username, points: globalMap[id] };
  }).sort((a,b)=>b.points-a.points).slice(0,5);

  const globalList = document.getElementById('global-leaderboard');
  globalList.innerHTML = '';
  globalArray.forEach(u => {
    const li = document.createElement('li');
    li.innerHTML = `<a href="profile.html?user_id=${u.id}">${u.username}</a> - ${u.points} pts`;
    globalList.appendChild(li);
  });

  // --- Friends Weekly Leaderboard ---
  const { data: friendsData, error: fError } = await supabaseClient.from('friends').select('friend_id').eq('user_id', currentUser.id);
  if(fError) return console.error(fError);

  const friendIds = friendsData.map(f=>f.friend_id);
  if(friendIds.length === 0) { document.getElementById('friends-leaderboard').innerHTML = '<li>No friends yet!</li>'; return; }

  const { data: friendsPoints, error: fpError } = await supabaseClient
    .from('points_log')
    .select('user_id, points, users(username)')
    .gte('created_at', isoWeekAgo)
    .in('user_id', friendIds);

  if(fpError) return console.error(fpError);

  const friendsMap = {};
  friendsPoints.forEach(p => { friendsMap[p.user_id] = (friendsMap[p.user_id] || 0) + p.points; });

  const friendsArray = Object.keys(friendsMap).map(id => {
    const entry = friendsPoints.find(p=>p.user_id===id);
    return { id, username: entry.users.username, points: friendsMap[id] };
  }).sort((a,b)=>b.points-a.points).slice(0,5);

  const friendsList = document.getElementById('friends-leaderboard');
  friendsList.innerHTML = '';
  friendsArray.forEach(u => {
    const li = document.createElement('li');
    li.innerHTML = `<a href="profile.html?user_id=${u.id}">${u.username}</a> - ${u.points} pts`;
    friendsList.appendChild(li);
  });
}

// --- Buy Items ---
async function buyItem(item, cost) {
  const { data, error } = await supabaseClient.from('users').select('points').eq('id', currentUser.id).single();
  if(error) return console.error(error);
  if(data.points < cost) return alert('Not enough points!');

  let updateObj = { points: data.points - cost };
  if(item==='streakFreeze') updateObj.streak_freeze = true;

  const { error: updateError } = await supabaseClient.from('users').update(updateObj).eq('id', currentUser.id);
  if(updateError) return console.error(updateError);

  if(item==='streakFreeze') alert('Streak Freeze activated!');
  if(item==='tutorSession') alert('15-minute tutor session booked!');

  await loadUserData();
  await loadLeaderboards();
}

document.getElementById('freeze-streak-btn').addEventListener('click', ()=>buyItem('streakFreeze',50));

initDashboard();
</script>

</body>
</html>

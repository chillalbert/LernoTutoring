<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Math Curriculum</title>
  <style>
    .dropdown {
      position: relative;
      display: inline-block;
      cursor: pointer;
      user-select: none;
      padding: 10px;
      border: 1px solid #aaa;
      width: 200px;
      background: white;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      border: 1px solid #aaa;
      background: white;
      width: 100%;
      max-height: 240px;
      overflow-y: auto;
      z-index: 1;
    }
    .dropdown-content div {
      padding: 8px;
    }
    .dropdown-content div:hover {
      background: #eee;
    }
    .show { display: block; }
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
      color: #333;
    }
    #contentArea {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border: 1px solid #ccc;
      box-shadow: 1px 1px 8px rgba(0,0,0,0.1);
      max-width: 800px;
    }
    h1.big { font-size: 2rem; margin-bottom: 10px; }
    h2 { margin-top: 0; }
    h3 { margin: .75em 0 .25em; }
    ul { margin: 0 0 1em 1.5em; }
  </style>
</head>
<link rel="stylesheet" href="mathpreview.css">
<body>
  <h1 class="big">Our Math Curriculum</h1>
  <p>At Lerno, we teach a comprehensive, CCSS‑aligned Math Curriculum from 1st through 8th grade.</p>

  <div class="dropdown" onclick="toggleDropdown()">
    <span id="dropdownLabel">Select Grade</span>
    <div id="myDropdown" class="dropdown-content">
      <div onclick="selectOption('1st Grade', event)">1st Grade</div>
      <div onclick="selectOption('2nd Grade', event)">2nd Grade</div>
      <div onclick="selectOption('3rd Grade', event)">3rd Grade</div>
      <div onclick="selectOption('4th Grade', event)">4th Grade</div>
      <div onclick="selectOption('5th Grade', event)">5th Grade</div>
      <div onclick="selectOption('6th Grade', event)">6th Grade</div>
      <div onclick="selectOption('7th Grade', event)">7th Grade</div>
      <div onclick="selectOption('8th Grade', event)">8th Grade</div>
    </div>
  </div>

  <div id="contentArea">Please select a grade above.</div>

  <script>
    function toggleDropdown() {
      document.getElementById("myDropdown").classList.toggle("show");
    }
    window.onclick = function(e) {
      if (!e.target.closest('.dropdown')) {
        document.getElementById("myDropdown").classList.remove("show");
      }
    };

    function selectOption(text, e) {
      e.stopPropagation();
      document.getElementById('dropdownLabel').textContent = text;
      document.getElementById("myDropdown").classList.remove("show");
      const c = document.getElementById('contentArea');

      if (text === '1st Grade') {
        c.innerHTML = `
          <h2>1st Grade Math</h2>
          <h3>Counting & Cardinality</h3>
          <ul>
            <li>Count to 120; read/write numerals; represent objects with numerals</li>
          </ul>
          <h3>Operations & Algebraic Thinking</h3>
          <ul>
            <li>Represent & solve problems with addition/subtraction within 20</li>
            <li>Apply properties of operations; relate counting to addition</li>
          </ul>
          <h3>Number & Operations in Base Ten</h3>
          <ul>
            <li>Understand tens and ones; add/subtract within 100 using place‑value strategies</li>
          </ul>
          <h3>Measurement & Data</h3>
          <ul>
            <li>Measure lengths indirectly; tell/write time to hour & half‑hour</li>
            <li>Organize & interpret data in simple graphs</li>
          </ul>
          <h3>Geometry</h3>
          <ul>
            <li>Reason with shapes by composing/decomposing; name & describe 2D and 3D shapes</li>
          </ul>
        `;
      }
      else if (text === '2nd Grade') {
        c.innerHTML = `
          <h2>2nd Grade Math</h2>
          <h3>Operations & Algebraic Thinking</h3>
          <ul>
            <li>Add/subtract within 100 fluently; solve one‑ and two‑step word problems</li>
            <li>Work with equal groups to introduce multiplication foundations</li>
          </ul>
          <h3>Number & Operations in Base Ten</h3>
          <ul>
            <li>Understand place value to 1000; use it to add/subtract</li>
          </ul>
          <h3>Measurement & Data</h3>
          <ul>
            <li>Measure & estimate lengths; tell/write time to nearest 5 minutes; work with money</li>
            <li>Represent/interpret data in picture/bar graphs</li>
          </ul>
          <h3>Geometry</h3>
          <ul>
            <li>Draw shapes with specified attributes; partition shapes into equal shares (½, ¼)</li>
          </ul>
        `;
      }
      else if (text === '3rd Grade') {
        c.innerHTML = `
          <h2>3rd Grade Math</h2>
          <h3>Operations & Algebraic Thinking</h3>
          <ul>
            <li>Multiply/divide within 100; use properties of operations; solve multi‑step problems</li>
          </ul>
          <h3>Number & Operations in Base Ten</h3>
          <ul>
            <li>Use place value to round; perform multi‑digit arithmetic</li>
          </ul>
          <h3>Number & Operations—Fractions</h3>
          <ul>
            <li>Understand unit fractions as numbers; represent fractions on number lines; explain equivalence</li>
          </ul>
          <h3>Measurement & Data</h3>
          <ul>
            <li>Solve problems involving time, liquid volumes, and masses; create bar graphs, pictographs, line plots</li>
            <li>Understand area & perimeter</li>
          </ul>
          <h3>Geometry</h3>
          <ul>
            <li>Reason with shapes: partition into parts with equal area; understand angles</li>
          </ul>
        `;
      }
      else if (text === '4th Grade') {
        c.innerHTML = `
          <h2>4th Grade Math</h2>
          <h3>Operations & Algebraic Thinking</h3>
          <ul>
            <li>Use four operations with whole numbers; understand factors & multiples; generate patterns</li>
          </ul>
          <h3>Number & Operations in Base Ten</h3>
          <ul>
            <li>Generalize place value to multi‑digit numbers; perform multi‑digit multiplication/division</li>
          </ul>
          <h3>Number & Operations—Fractions</h3>
          <ul>
            <li>Understand fraction equivalence & ordering; add/subtract fractions with like denominators; decimal notation</li>
          </ul>
          <h3>Measurement & Data</h3>
          <ul>
            <li>Convert measurement units; apply area & perimeter formulas; measure/draw angles; interpret line plots</li>
          </ul>
          <h3>Geometry</h3>
          <ul>
            <li>Draw & classify shapes by lines & angles; construct quadrilaterals</li>
          </ul>
        `;
      }
      else if (text === '5th Grade') {
        c.innerHTML = `
          <h2>5th Grade Math</h2>
          <h3>Operations & Algebraic Thinking</h3>
          <ul>
            <li>Write & interpret numerical expressions; analyze patterns & relationships</li>
          </ul>
          <h3>Number & Operations in Base Ten</h3>
          <ul>
            <li>Understand place value to thousandths; perform operations with whole numbers & decimals</li>
          </ul>
          <h3>Number & Operations—Fractions</h3>
          <ul>
            <li>Add/subtract fractions with unlike denominators; multiply & divide fractions; solve related word problems</li>
          </ul>
          <h3>Measurement & Data</h3>
          <ul>
            <li>Convert measurement units; understand volume; graph points on the coordinate plane</li>
          </ul>
          <h3>Geometry</h3>
          <ul>
            <li>Classify 2D figures by properties; understand volume of solid figures</li>
          </ul>
        `;
      }
      else if (text === '6th Grade') {
        c.innerHTML = `
          <h2>6th Grade Math</h2>
          <h3>Ratios & Proportional Relationships</h3>
          <ul>
            <li>Understand ratio concepts; use ratio reasoning to solve problems</li>
          </ul>
          <h3>The Number System</h3>
          <ul>
            <li>Divide fractions by fractions; compute with multi‑digit decimals; apply to negative numbers</li>
          </ul>
          <h3>Expressions & Equations</h3>
          <ul>
            <li>Write/read/evaluate expressions; solve one‑variable equations & inequalities</li>
          </ul>
          <h3>Geometry</h3>
          <ul>
            <li>Solve problems involving area, surface area, & volume of solids</li>
          </ul>
          <h3>Statistics & Probability</h3>
          <ul>
            <li>Develop understanding of statistical variability; summarize distributions (mean, median, mode, range)</li>
          </ul>
        `;
      }
      else if (text === '7th Grade') {
        c.innerHTML = `
          <h2>7th Grade Math</h2>
          <h3>Ratios & Proportional Relationships</h3>
          <ul>
            <li>Analyze proportional relationships; graph them; apply to real‑world problems</li>
          </ul>
          <h3>The Number System</h3>
          <ul>
            <li>Apply operations with all rational numbers (positive & negative)</li>
          </ul>
          <h3>Expressions & Equations</h3>
          <ul>
            <li>Solve multi‑step problems using equations & inequalities; work with integer exponents</li>
          </ul>
          <h3>Geometry</h3>
          <ul>
            <li>Draw/construct geometric figures; understand similarity & scale drawings; analyze angle relationships</li>
          </ul>
          <h3>Statistics & Probability</h3>
          <ul>
            <li>Develop probability models; use random sampling; draw inferences about populations</li>
          </ul>
        `;
      }
      else if (text === '8th Grade') {
        c.innerHTML = `
          <h2>8th Grade Math</h2>
          <h3>The Number System</h3>
          <ul>
            <li>Understand irrational numbers; approximate them by rational numbers</li>
          </ul>
          <h3>Expressions & Equations</h3>
          <ul>
            <li>Work with radicals & integer exponents; solve linear equations & systems</li>
          </ul>
          <h3>Functions</h3>
          <ul>
            <li>Define/evaluate/compare functions; use them to model relationships</li>
          </ul>
          <h3>Geometry</h3>
          <ul>
            <li>Understand congruence & similarity via transformations; apply Pythagorean Theorem; solve volume problems for cones, cylinders, spheres</li>
          </ul>
          <h3>Statistics & Probability</h3>
          <ul>
            <li>Investigate patterns of association in bivariate data; construct & interpret scatter plots and lines of best fit</li>
          </ul>
        `;
      }
    }
  </script>
  <script src="/path/to/supabase.js"></script>
  <script>
    const supabase = createClient('https://YOUR_PROJECT.supabase.co', 'YOUR_ANON_KEY');
  
    supabase.auth.getSession().then(({ data: { session } }) => {
      updateUI(session); // your custom UI logic
    });
  </script>
  
</body>
</html>

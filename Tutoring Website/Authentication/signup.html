<!DOCTYPE html>
<html>
<head>
  <title>Login/Logout System</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { display: block; margin: 10px 0; }
    nav { text-align: center; margin-bottom: 20px; }
    nav a {
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      color: #1565C0;
      font-size: 20px;
      padding: 10px;
      text-decoration: none;
    }
    .big { font-size: 18px; }
  </style>
  <link rel="stylesheet" href="./signup.css">
</head>
<body>

<nav>
  <a href="../index.html">Home</a>
  <a href="../book.html">Tutoring</a>
  <a href="../Authentication/signup.html">Sign In/Up</a>
  <a href="../pricing.html">Pricing</a>
  <a href="../livetutorchat.html">Chat With a Tutor</a>
</nav>

<h2 class="big">Sign Up</h2>
<input id="signup-email" type="email" placeholder="Email">
<input id="signup-password" type="password" placeholder="Password">
<button id="signup-button" onclick="signUp()">Sign Up</button>

<h2 class="big">Login</h2>
<input id="login-email" type="email" placeholder="Email">
<input id="login-password" type="password" placeholder="Password">
<button id="login-button" onclick="signIn()">Login</button>

<h2 class="big">User Info</h2>
<pre id="user-info" class="big">Not logged in</pre>
<button id="logout-button" onclick="signOut()">Logout</button>

<script type="module">
  const SUPABASE_URL = 'https://jzfkcapslrnctklvjlcf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6ZmtjYXBzbHJuY3RrbHZqbGNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDcxMDY0NDgsImV4cCI6MjA2MjY4MjQ0OH0.6iNWI1dOTCbZcyATzocIlzy5ojga8UMLdbM7Dp4mi7s';
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function signUp() {
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    const { error } = await client.auth.signUp({
      email,
      password,
      options: {
        emailRedirectTo: 'http://127.0.0.1:3000/book.html'
      }
    });

    if (error) {
      alert('Sign up error: ' + error.message);
    } else {
      alert('Sign up successful! Enter your email and password below in the Login section.');
    }
  }

  async function signIn() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const { data, error } = await client.auth.signInWithPassword({ email, password });

    if (error) {
      alert('Login error: ' + error.message);
    } else {
      window.location.href = '../book.html';
    }
  }

  async function signOut() {
    const { error } = await client.auth.signOut();
    if (error) {
      alert('Logout error: ' + error.message);
    } else {
      document.getElementById('user-info').textContent = 'Not logged in';
    }
  }

  // Show current user info
  client.auth.getUser().then(({ data: { user } }) => {
    document.getElementById('user-info').textContent = user ? user.email : 'Not logged in';

    // Optional: insert user in your 'users' table with default points
    if (user) {
      client.from('users')
        .insert([{ id: user.id, points: 0 }])
        .then(({ error }) => {
          if (error) console.error('Insert user failed:', error);
        });
    }
  });

  // Attach functions globally
  window.signUp = signUp;
  window.signIn = signIn;
  window.signOut = signOut;
</script>

</body>
</html>

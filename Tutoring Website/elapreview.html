<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ELA Curriculum</title>
  <style>
    .dropdown {
      position: relative;
      display: inline-block;
      cursor: pointer;
      user-select: none;
      padding: 10px;
      border: 1px solid #aaa;
      width: 150px;
      background-color: white;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      border: 1px solid #aaa;
      background-color: white;
      width: 100%;
      box-sizing: border-box;
      z-index: 1;
      max-height: 200px;
      overflow-y: auto;
    }

    .dropdown-content div {
      padding: 8px 10px;
    }

    .dropdown-content div:hover {
      background-color: #eee;
    }

    .show {
      display: block;
    }

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
      color: #333;
    }

    #contentArea {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border: 1px solid #ccc;
      max-width: 700px;
      box-shadow: 1px 1px 8px rgba(0,0,0,0.1);
    }

    h1.big {
      font-size: 2rem;
      margin-bottom: 10px;
      color:#0288D1;
    }
    p {
        color: #263238
    }
  </style>
</head>
<body>
  <h1 class="big">Our ELA Curriculum</h1>
  <p class="text">Currently at Lerno, we are doing 1st-8th Grade English Language Arts. Here's what we teach!</p>

  <div class="dropdown" onclick="toggleDropdown()">
    <span id="dropdownLabel">Select</span>
    <div id="myDropdown" class="dropdown-content">
      <div id="1stela" onclick="selectOption('1st Grade', event)">1st Grade</div>
      <div id="2ndela" onclick="selectOption('2nd Grade', event)">2nd Grade</div>
      <div onclick="selectOption('3rd Grade', event)">3rd Grade</div>
      <div onclick="selectOption('4th Grade', event)">4th Grade</div>
      <div onclick="selectOption('5th Grade', event)">5th Grade</div>
      <div onclick="selectOption('6th Grade', event)">6th Grade</div>
      <div onclick="selectOption('7th Grade', event)">7th Grade</div>
      <div onclick="selectOption('8th Grade', event)">8th Grade</div>
    </div>
  </div>

  <div id="contentArea">Please select an option above.</div>

    function toggleDropdown() {
    document.getElementById("myDropdown").classList.toggle("show");
  }

  function selectOption(text, event) {
    if (event) {
      event.stopPropagation();
    }
    document.getElementById('dropdownLabel').textContent = text;
    document.getElementById("myDropdown").classList.remove("show");

    const contentArea = document.getElementById('contentArea');
      if (text === '1st Grade') {
        contentArea.innerHTML = `

            <li>Know final -e and common vowel team conventions for long vowel sounds</li>

            <li>Read common high-frequency words by sight (e.g., the, of, to, you, she)</li>
          </ul>

          <ul>
            <li>Read grade-level text with accuracy and fluency to support comprehension</li>
            <li>Read with expression and appropriate pacing</li>
          </ul>
          <h4>Comprehension</h4>

            <li>Ask and answer questions about key details in a text</li>
            <li>Retell stories including key details and central message or lesson</li>

            <li>Understand the role of illustrations and words in a text</li>
            <li>Distinguish between fiction and nonfiction texts</li>

            <li>Use end punctuation (periods, question marks, exclamation points)</li>
            <li>Use commas in dates and to separate words in series</li>

            <li>Participate in conversations about grade 1 topics and texts</li>
            <li>Follow agreed-upon rules for discussions</li>
            <li>Ask and answer questions to clarify understanding</li>

          <h4>Presentation of Knowledge & Ideas</h4>
          <ul>
            <li>Describe people, places, things, and events with relevant details</li>

    // Close dropdown if clicked outside
    window.onclick = function(event) {
      const dropdown = document.querySelector('.dropdown');
      if (!dropdown.contains(event.target)) {
        const myDropdown = document.getElementById("myDropdown");
        if (myDropdown.classList.contains('show')) {
          myDropdown.classList.remove('show');
        }
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      // Get the hash from the URL (e.g., #grade1, #grade2)
      const hash = window.location.hash;

      // Get the dropdown element
      const dropdown = document.getElementById("grade-dropdown");

      // Check if there's a valid hash
      if (hash && dropdown) {
        // Remove the '#' from the hash to get the value (e.g., 'grade1', 'grade2')
        const grade = hash.replace("#", "");

        // If the grade exists, set the dropdown's value to the corresponding grade
        const option = document.getElementById(grade);
        if (option) {
          dropdown.value = option.value;
        }
      }
    });

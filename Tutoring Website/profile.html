<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lerno Profile</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #111;
    color: #eee;
    margin: 0;
    padding: 0;
  }

  header {
    background: #222;
    padding: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  header h1 {
    color: #0f0;
    margin: 0;
  }

  header a {
    color: #0f0;
    text-decoration: none;
    font-weight: bold;
  }

  .container {
    padding: 1rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1rem;
  }

  .card {
    background: #222;
    border-radius: 12px;
    padding: 1rem;
    box-shadow: 0 0 10px rgba(0,255,255,0.2);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 20px rgba(0,255,255,0.5);
  }

  .card h2 {
    color: #0ff;
    margin-top: 0;
    margin-bottom: 0.5rem;
  }

  .card p {
    margin: 0.2rem 0;
  }

  .badge {
    display: inline-block;
    background: #0ff;
    color: #000;
    padding: 0.3rem 0.5rem;
    margin: 0.2rem;
    border-radius: 5px;
    font-size: 0.85rem;
    font-weight: bold;
  }

  button {
    background: #0f0;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    color: #000;
    margin-top: 0.5rem;
    font-weight: bold;
  }

  button:disabled {
    background: #555;
    cursor: not-allowed;
  }

  ul {
    list-style: none;
    padding: 0;
    margin: 0.5rem 0 0 0;
  }

  li {
    padding: 0.2rem 0;
    border-bottom: 1px solid #333;
  }

  #search-container {
    margin-bottom: 1rem;
    display: flex;
    gap: 0.5rem;
  }

  input[type="text"] {
    flex: 1;
    padding: 0.5rem;
    border-radius: 6px;
    border: none;
    outline: none;
  }
</style>
</head>
<body>

<header>
  <h1 id="profile-title">Profile</h1>
  <div>
    <a href="dashboard.html">Back to Dashboard</a>
  </div>
</header>

<div class="container">

  <!-- Search by username -->
  <div class="card" id="search-container">
    <input type="text" id="username-search" placeholder="Search username">
    <button id="search-btn">Search</button>
  </div>

  <!-- User Info -->
  <div class="card" id="user-info-card">
    <h2 id="username-display">Username</h2>
    <p id="user-points">Points: 0</p>
    <p id="user-streak">🔥 Streak: 0</p>
    <p id="friend-count">Friends: 0</p>
    <button id="add-friend-btn">Add Friend</button>
  </div>

  <!-- Progress -->
  <div class="card" id="progress-card">
    <h2>Progress</h2>
    <p id="lessons-completed">Lessons Completed: 0</p>
    <p id="categories-mastered">Categories Mastered: 0</p>
    <h3>Recent Activity:</h3>
    <ul id="activity-feed"></ul>
  </div>

  <!-- Achievements -->
  <div class="card" id="achievements-card">
    <h2>Achievements</h2>
    <div id="badges-container"></div>
  </div>

  <!-- Friends List -->
  <div class="card" id="friends-card">
    <h2>Friends</h2>
    <div id="friend-list">Loading friends...</div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://jzfkcapslrnctklvjlcf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6ZmtjYXBzbHJuY3RrbHZqbGNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDcxMDY0NDgsImV4cCI6MjA2MjY4MjQ0OH0.6iNWI1dOTCbZcyATzocIlzy5ojga8UMLdbM7Dp4mi7s';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let viewedUserId = null;

async function initProfile() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) return alert('Please log in.');
  currentUser = user;

  // Check URL for user_id
  const urlParams = new URLSearchParams(window.location.search);
  viewedUserId = urlParams.get('user_id') || currentUser.id;

  await loadUserProfile();
  await loadFriendsCount();
  await loadProgress();
  await loadAchievements();
  await loadFriendsList();
}

async function loadUserProfile() {
  const { data, error } = await supabaseClient
    .from('users')
    .select('id, username, points, streak')
    .eq('id', viewedUserId)
    .single();
  if (error) return console.error(error);

  document.getElementById('username-display').innerText = data.username || 'Unknown';
  document.getElementById('profile-title').innerText = `${data.username}'s Profile`;
  document.getElementById('user-points').innerText = `Points: ${data.points}`;
  document.getElementById('user-streak').innerText = `🔥 Streak: ${data.streak}`;

  const addBtn = document.getElementById('add-friend-btn');
  if (currentUser.id === viewedUserId) {
    addBtn.style.display = 'none';
  } else {
    addBtn.style.display = 'inline-block';
    const { data: friendCheck } = await supabaseClient
      .from('friends')
      .select('*')
      .eq('user_id', currentUser.id)
      .eq('friend_id', viewedUserId)
      .single();
    addBtn.disabled = !!friendCheck;
    addBtn.innerText = friendCheck ? 'Friend Added' : 'Add Friend';
  }
}

async function loadFriendsCount() {
  const { data } = await supabaseClient
    .from('friends')
    .select('*')
    .eq('user_id', viewedUserId);
  document.getElementById('friend-count').innerText = `Friends: ${data?.length || 0}`;
}

async function loadProgress() {
  const { data } = await supabaseClient
    .from('users')
    .select('activity_text')
    .eq('id', viewedUserId)
    .single();

  const activities = data.activity_text ? data.activity_text.split('\n').slice(-5).reverse() : [];
  const activityFeed = document.getElementById('activity-feed');
  activityFeed.innerHTML = '';
  activities.forEach(act => {
    const li = document.createElement('li');
    li.innerText = act;
    activityFeed.appendChild(li);
  });

  const lines = data.activity_text ? data.activity_text.split('\n') : [];
  document.getElementById('lessons-completed').innerText = `Lessons Completed: ${lines.length}`;
  const categories = [...new Set(lines.map(l => l.split(':')[0]))];
  document.getElementById('categories-mastered').innerText = `Categories Mastered: ${categories.length}`;
}

async function loadAchievements() {
  const { data } = await supabaseClient
    .from('users')
    .select('points, streak')
    .eq('id', viewedUserId)
    .single();

  const badgesContainer = document.getElementById('badges-container');
  badgesContainer.innerHTML = '';
  if(data.streak >= 5) badgesContainer.innerHTML += `<span class="badge">5-Day Streak</span>`;
  if(data.streak >= 10) badgesContainer.innerHTML += `<span class="badge">10-Day Streak</span>`;
  if(data.points >= 100) badgesContainer.innerHTML += `<span class="badge">100 Points</span>`;
  if(data.points >= 500) badgesContainer.innerHTML += `<span class="badge">500 Points</span>`;
}

async function loadFriendsList() {
  const { data: friendData } = await supabaseClient
    .from('friends')
    .select('friend_id')
    .eq('user_id', viewedUserId);

  const friendIds = friendData?.map(f => f.friend_id) || [];
  const friendListDiv = document.getElementById('friend-list');
  friendListDiv.innerHTML = '';

  if (friendIds.length === 0) {
    friendListDiv.innerText = 'No friends yet.';
    return;
  }

  const { data: friends, error } = await supabaseClient
    .from('users')
    .select('id, username')
    .in('id', friendIds);

  if (error) return console.error(error);

  friends.forEach(f => {
    const div = document.createElement('div');
    div.className = 'friend';
    div.innerText = f.username;
    friendListDiv.appendChild(div);
  });
}

// Add Friend
document.getElementById('add-friend-btn').addEventListener('click', async () => {
  const { error } = await supabaseClient
    .from('friends')
    .insert([{ user_id: currentUser.id, friend_id: viewedUserId }]);
  if (error) return console.error(error);
  alert('Friend added!');
  const btn = document.getElementById('add-friend-btn');
  btn.disabled = true;
  btn.innerText = 'Friend Added';
  await loadFriendsCount();
  await loadFriendsList();
});

// Search by username
document.getElementById('search-btn').addEventListener('click', async () => {
  const username = document.getElementById('username-search').value.trim();
  if(!username) return alert('Enter a username to search.');
  const { data, error } = await supabaseClient
    .from('users')
    .select('id')
    .ilike('username', username)
    .limit(1)
    .single();
  if(error || !data) return alert('User not found.');
  window.location.href = `profile.html?user_id=${data.id}`;
});

initProfile();
</script>

</body>
</html>

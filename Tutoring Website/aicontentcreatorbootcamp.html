<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Prompting Bootcamp Game</title>
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: #0f0f1f;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0;
  padding: 20px;
}
.dashboard {
  background: #1a1a2e;
  padding: 30px;
  border-radius: 15px;
  width: 90%;
  max-width: 700px;
  box-shadow: 0 0 20px #00ffea;
  text-align: center;
}
h1 { color: #00ffea; }
h2 { color: #ffea00; }
textarea {
  width: 100%;
  height: 80px;
  margin-top: 10px;
  border-radius: 10px;
  border: 2px solid #00ffea;
  background-color: #0f0f1f;
  color: #fff;
  padding: 10px;
  font-size: 16px;
}
button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background-color: #00ffea;
  color: #0f0f1f;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}
button:hover { background-color: #ffea00; }
#feedback, #hint, #example { margin-top: 10px; font-weight: bold; }
#score, #timer { margin-top: 10px; color: #00ffea; font-weight: bold; }
.progress-bar-container { width: 100%; background-color: #11111f; border-radius: 10px; margin-bottom: 20px; }
.progress-bar { height: 15px; width: 0%; background-color: #ffea00; border-radius: 10px; transition: width 0.5s ease-in-out; }
#confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
#leaderboard { margin-top: 20px; color: #ffea00; }
</style>
</head>
<body>
<div class="dashboard">
  <h1>AI Prompting Bootcamp Game</h1>
  <div class="progress-bar-container">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div id="level-container">
    <h2 id="level-title"></h2>
    <p id="level-description"></p>

    <div id="challenge-container">
      <p id="challenge-text"></p>
      <textarea id="user-input" placeholder="Write your AI prompt here..."></textarea>
      <button id="submit-btn">Submit Prompt</button>
      <p id="feedback"></p>
      <p id="example"></p>
    </div>

    <p id="hint"></p>
    <p id="score">Score: 0</p>
    <p id="timer">Time left: 60s</p>
  </div>

  <div id="completion" style="display:none;">
    <h2>🎉 Bootcamp Completed! 🎉</h2>
    <p>Your final score: <span id="final-score"></span></p>
    <div id="leaderboard">
      <h3>🏆 Leaderboard</h3>
      <ol id="leaderboard-list"></ol>
    </div>
    <button id="restart-btn">Play Again</button>
  </div>

  <canvas id="confetti-canvas"></canvas>
</div>

<script>
const levels = [
  {
    title:"Level 1: AI as Your Copywriter",
    description:"Create effective AI prompts for copywriting tasks.",
    challenges:[
      {text:"Write a prompt to get AI to generate a catchy blog headline.", keywords:["headline","blog","catchy"], example:"Generate 5 catchy blog headlines about AI tools."},
      {text:"Write a prompt for AI to write a short ad for a product.", keywords:["ad","product","short"], example:"Write a 20-word ad for a new smart coffee maker."},
      {text:"Write a prompt for AI to make a newsletter intro engaging.", keywords:["newsletter","intro","engaging"], example:"Create a compelling newsletter intro about content creation tips."}
    ]
  },
  {
    title:"Level 2: Teaching AI Your Brand Voice",
    description:"Practice writing prompts that teach AI a specific tone.",
    challenges:[
      {text:"Write a prompt to get AI to write friendly social media captions.", keywords:["friendly","social","caption"], example:"Write 3 friendly Instagram captions for a fitness brand."},
      {text:"Prompt AI to write in a professional tone for LinkedIn.", keywords:["professional","LinkedIn","tone"], example:"Write a professional LinkedIn post introducing a new AI tool."},
      {text:"Prompt AI to write a fun product description.", keywords:["fun","product","description"], example:"Write a fun product description for a new water bottle."}
    ]
  },
  {
    title:"Level 3: AI as Your Brainstorming Buddy",
    description:"Create prompts that help AI generate multiple ideas.",
    challenges:[
      {text:"Prompt AI to brainstorm blog post ideas about content marketing.", keywords:["blog","ideas","content"], example:"Brainstorm 5 blog post ideas about content marketing."},
      {text:"Prompt AI to suggest 3 newsletter topics.", keywords:["newsletter","topics","suggest"], example:"Suggest 3 newsletter topics for a tech audience."},
      {text:"Prompt AI to list 3 video ideas for social media.", keywords:["video","ideas","social"], example:"List 3 short video ideas for Instagram reels."}
    ]
  },
  {
    title:"Level 4: From Idea to Outline with AI",
    description:"Write prompts that guide AI to structure content.",
    challenges:[
      {text:"Prompt AI to create a blog outline with 3 main points.", keywords:["outline","main","points"], example:"Create a blog outline with 3 main points about AI writing tools."},
      {text:"Prompt AI to make a step-by-step guide.", keywords:["guide","steps","tutorial"], example:"Write a step-by-step guide for using ChatGPT effectively."},
      {text:"Prompt AI to create a structured article plan.", keywords:["plan","structured","article"], example:"Make a structured plan for an article on remote work productivity."}
    ]
  },
  {
    title:"Level 5: Research Smarter, Not Harder",
    description:"Prompt AI to gather facts or insights.",
    challenges:[
      {text:"Prompt AI to list 3 stats about AI adoption.", keywords:["stats","AI","adoption"], example:"Provide 3 recent statistics about AI adoption in business."},
      {text:"Prompt AI to summarize a topic in 2 sentences.", keywords:["summarize","topic","sentences"], example:"Summarize the benefits of AI in marketing in 2 sentences."},
      {text:"Prompt AI to list pros and cons of AI tools.", keywords:["pros","cons","AI"], example:"List the pros and cons of using AI writing tools."}
    ]
  },
  {
    title:"Level 6: From Outline to Article",
    description:"Prompt AI to expand points into paragraphs.",
    challenges:[
      {text:"Prompt AI to write a 3-sentence paragraph about a key point.", keywords:["paragraph","3 sentences","point"], example:"Write a 3-sentence paragraph about using AI to generate headlines."},
      {text:"Prompt AI to explain a concept clearly.", keywords:["explain","concept","clearly"], example:"Explain how AI can assist content creators in simple terms."},
      {text:"Prompt AI to write a detailed introduction.", keywords:["introduction","detailed","topic"], example:"Write a detailed introduction about AI in marketing."}
    ]
  },
  {
    title:"Level 7: Multiply Your Content",
    description:"Prompt AI to repurpose content for social media.",
    challenges:[
      {text:"Prompt AI to turn a paragraph into 2 Twitter posts.", keywords:["Twitter","2 posts","paragraph"], example:"Convert this paragraph into 2 engaging tweets."},
      {text:"Prompt AI to create Instagram captions from a blog point.", keywords:["Instagram","captions","blog"], example:"Turn this blog section into 2 Instagram captions."},
      {text:"Prompt AI to make LinkedIn summary posts.", keywords:["LinkedIn","summary","posts"], example:"Summarize this article into 2 LinkedIn posts."}
    ]
  },
  {
    title:"Level 8: Boss Challenge",
    description:"Combine all prompting skills to create full content workflow.",
    challenges:[
      {text:"Prompt AI to brainstorm 3 article ideas about AI content.", keywords:["brainstorm","ideas","article"], example:"Brainstorm 3 article ideas about AI content creation."},
      {text:"Prompt AI to make an outline for one idea.", keywords:["outline","idea","points"], example:"Create a blog outline for the first idea with 3 main points."},
      {text:"Prompt AI to write a long-form paragraph based on outline.", keywords:["paragraph","long-form","outline"], example:"Write a 3-sentence paragraph expanding the first point."},
      {text:"Prompt AI to repurpose paragraph into 2 social posts.", keywords:["repurpose","social","posts"], example:"Turn the paragraph into 2 social media posts."}
    ]
  }
];

let currentLevel=0, currentChallenge=0, score=0, timeLeft=60, timerInterval;

const levelTitle=document.getElementById("level-title");
const levelDescription=document.getElementById("level-description");
const challengeText=document.getElementById("challenge-text");
const userInput=document.getElementById("user-input");
const submitBtn=document.getElementById("submit-btn");
const feedback=document.getElementById("feedback");
const example=document.getElementById("example");
const scoreDisplay=document.getElementById("score");
const completionDiv=document.getElementById("completion");
const finalScore=document.getElementById("final-score");
const restartBtn=document.getElementById("restart-btn");
const hint=document.getElementById("hint");
const timerDisplay=document.getElementById("timer");
const progressBar=document.getElementById("progress-bar");

function loadChallenge(){
  const level = levels[currentLevel];
  const challenge = level.challenges[currentChallenge];
  levelTitle.textContent = level.title;
  levelDescription.textContent = level.description;
  challengeText.textContent = challenge.text;
  userInput.value="";
  feedback.textContent="";
  example.textContent="";
  hint.textContent=`💡 Hint: Use keywords like ${challenge.keywords.join(", ")}`;
  timeLeft=60;
  timerDisplay.textContent=`Time left: ${timeLeft}s`;
  clearInterval(timerInterval);
  timerInterval=setInterval(updateTimer,1000);
  progressBar.style.width=`${((currentLevel + currentChallenge/level.challenges.length)/levels.length)*100}%`;
}

function updateTimer(){
  timeLeft--;
  timerDisplay.textContent=`Time left: ${timeLeft}s`;
  if(timeLeft<=0){ feedback.textContent="⏰ Time's up! Submit your prompt anyway."; clearInterval(timerInterval);}
}

function checkAnswer(){
  const level = levels[currentLevel];
  const challenge = level.challenges[currentChallenge];
  const input = userInput.value.toLowerCase();
  let hits=0;
  challenge.keywords.forEach(k => { if(input.includes(k.toLowerCase())) hits++; });
  const requiredHits = Math.ceil(challenge.keywords.length/2);

  if(hits>=requiredHits){
    feedback.textContent="✅ Good prompt!";
    example.textContent=`Example AI response:\n${challenge.example}`;
    score +=10;
    scoreDisplay.textContent=`Score: ${score}`;
    currentChallenge++;
    clearInterval(timerInterval);
    if(currentChallenge < level.challenges.length){
      setTimeout(loadChallenge,1000);
    } else {
      currentLevel++;
      currentChallenge=0;
      if(currentLevel < levels.length){
        setTimeout(loadChallenge,1000);
      } else {
        setTimeout(showCompletion,1000);
      }
    }
  } else {
    feedback.textContent="❌ Try including more relevant keywords!";
  }
}

function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const confettiCount=150; const confetti=[];
  for(let i=0;i<confettiCount;i++){ confetti.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,r:Math.random()*6+4,d:Math.random()*confettiCount,color:`hsl(${Math.random()*360},100%,50%)`,tilt:Math.random()*10-10,tiltAngleIncrement:Math.random()*0.07+0.05,tiltAngle:0});}
  function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); confetti.forEach(c=>{ ctx.beginPath(); ctx.lineWidth=c.r; ctx.strokeStyle=c.color; ctx.moveTo(c.x+c.tilt+c.r/2,c.y); ctx.lineTo(c.x+c.tilt,c.y+c.tilt+c.r/2); ctx.stroke(); }); update(); }
  function update(){ confetti.forEach(c=>{ c.tiltAngle+=c.tiltAngleIncrement; c.y+=(Math.cos(c.d)+3+c.r/2)/2; c.tilt=Math.sin(c.tiltAngle)*15; if(c.y>canvas.height){c.y=-10;c.x=Math.random()*canvas.width;} }); }
  const interval=setInterval(draw,20); setTimeout(()=>clearInterval(interval),5000);
}

function showLeaderboard(){
  let scores=JSON.parse(localStorage.getItem('aiBootcampScores'))||[];
  scores.push(score);
  scores.sort((a,b)=>b-a);
  scores=scores.slice(0,5);
  localStorage.setItem('aiBootcampScores',JSON.stringify(scores));
  const list=document.getElementById('leaderboard-list'); list.innerHTML="";
  scores.forEach(s=>{const li=document.createElement('li'); li.textContent=s; list.appendChild(li);});
}

function showCompletion(){
  document.getElementById("level-container").style.display="none";
  completionDiv.style.display="block";
  finalScore.textContent=score;
  progressBar.style.width=`100%`;
  launchConfetti();
  showLeaderboard();
}

submitBtn.addEventListener("click",checkAnswer);
restartBtn.addEventListener("click",()=>{
  currentLevel=0; currentChallenge=0; score=0;
  completionDiv.style.display="none";
  document.getElementById("level-container").style.display="block";
  scoreDisplay.textContent=`Score: ${score}`;
  loadChallenge();
});

loadChallenge();
</script>
</body>
</html>

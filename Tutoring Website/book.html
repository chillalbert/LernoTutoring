<body>
  <h1 id="big">Book a Class With Lerno</h1>
  <div style="text-align: center;">
  <button
    id="notsignedin"
    onclick="window.location.href='Authentication/signup.html'"
    style="width:180px;height:50px;font-size:17px;color:yellow;background-color: #0288D1; display:none; margin: 0 auto;"
  >
    Create an Account
  </button>
  </div>

  <p id="signedin">Welcome back!</p>
  <div id="calendar-container"></div>


  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  
    const supabase = createClient(
      'https://jzfkcapslrnctklvjlcf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6ZmtjYXBzbHJuY3RrbHZqbGNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDcxMDY0NDgsImV4cCI6MjA2MjY4MjQ0OH0.6iNWI1dOTCbZcyATzocIlzy5ojga8UMLdbM7Dp4mi7s'
    );
  
    const signedinText = document.getElementById('signedin');
    const notsignedinBtn = document.getElementById('notsignedin');
    const calendarContainer = document.getElementById('calendar-container');
  
  document.addEventListener('DOMContentLoaded', async () => {
  const { data } = await supabase.auth.getSession();
  await updateUI(data.session);

  supabase.auth.onAuthStateChange((_event, session) => {
    updateUI(session);
  });

  async function updateUI(session) {
    calendarContainer.innerHTML = ''; // always clear first
    if (session?.user?.email) {
      signedinText.textContent = `With Lerno, your first class is completely free. This means that you can always pull out if you don't like the service. Schedule your class(es) below!`;
      signedinText.style.display = 'block';
      notsignedinBtn.style.display = 'none';

      // Only create and append iframe if signed in
      const iframe = document.createElement('iframe');
      iframe.src = "https://calendar.google.com/calendar/appointments/schedules/AcZssZ2U0gd73w_-FAJ7TczFHAPP7T0Fyc0fVdGPHEqZh_Sz9uX0rIq8dkrJ4MKo1sfCDMdyV_OxbALw?gv=true";
      iframe.style.border = "0";
      iframe.width = "100%";
      iframe.height = "600";
      iframe.frameBorder = "0";
      calendarContainer.appendChild(iframe);

    } else {
      signedinText.style.display = 'none';
      notsignedinBtn.style.display = 'inline-block';
      // Calendar container is already cleared above
    }
  }
});
  </script>

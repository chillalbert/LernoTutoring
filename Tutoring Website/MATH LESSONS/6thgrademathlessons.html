<!DOCTYPE html>
<html>
<head>
  <title>6th Grade Math Course</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <link rel="shortcut icon" type="image/png" href="../Lerno Logo.png">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background-color: #F9FBE7; }
    #protected-content { display: none; }
    .question-feedback { margin-top: 10px; font-weight: bold; }
    .correct { color: green; }
    .incorrect { color: red; }
    .quiz-question { margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 8px; background-color: #f0f8ff; }
    .quiz-question p { font-size: 1.1em; margin-bottom: 10px; }
    .quiz-question ul { list-style: none; padding: 0; }
    .quiz-question li { margin-bottom: 5px; }
    .quiz-question input[type="radio"] { margin-right: 8px; }
    button { padding: 10px 20px; font-size: 1em; cursor: pointer; border: none; border-radius: 5px; margin-right: 10px; }
    #randombut { background-color: #4CAF50; color: white; }
    #finishButton { background-color: #008CBA; color: white; display: none; }
    .lesson-link { cursor: pointer; display: block; margin-bottom: 5px; text-decoration: none; color: black; }
    iframe { display: none; margin-top: 10px; margin-bottom: 20px; }
  </style>
</head>
<body>

<div id="protected-content">
  <div style="text-align: center;">
    <img src="../Lerno Logo.png" alt="Lerno Logo" style="width: 200px; height: auto; padding: 20px;">
    <h2 style="color: #0288D1;">6th Grade Math Course</h2>

    <!-- LESSON 1 -->
    <div style="text-align: left;">
      <a class="lesson-link" onclick="toggleVisibility('video1')"><h4>Lesson 1: Ratios and Proportional Relationships</h4></a>
      <iframe id="video1" width="560" height="315" src="https://www.youtube.com/embed/RQ2nYSi-Nys" title="6th Grade Math: Ratios and Proportional Relationships" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <!-- LESSON 2 -->
    <div style="text-align: left;">
      <a class="lesson-link" onclick="toggleVisibility('video2')"><h4>Lesson 2: Dividing Fractions by Fractions</h4></a>
      <iframe id="video2" width="560" height="315" src="https://www.youtube.com/embed/z52X4O9u61Y" title="6th Grade Math: Dividing Fractions by Fractions" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <!-- QUIZ 1 -->
    <div style="text-align: left;">
      <a class="lesson-link" onclick="toggleQuizVisibility('quiz1questions')"><h4>Quiz 1: Ratios and Proportional Relationships</h4></a>
      <div id="quiz1questions" style="display: none;">
        <!-- Example Question -->
        <div id="q1" class="quiz-question" data-answer="a">
          <p>1. What is the ratio of 3 to 6?</p>
          <ul>
            <li><input type="radio" name="q1_radio" value="a"> a) 1:2</li>
            <li><input type="radio" name="q1_radio" value="b"> b) 2:1</li>
            <li><input type="radio" name="q1_radio" value="c"> c) 3:6</li>
            <li><input type="radio" name="q1_radio" value="d"> d) 6:3</li>
          </ul>
          <button onclick="checkAnswer('q1')">Submit Answer</button>
          <div class="question-feedback"></div>
        </div>

        <!-- Add remaining questions here (q2 - q8) similar to q1 -->

        <button id="randombut" onclick="showRandomQuestion()">Next Random Question</button>
        <button id="finishButton" onclick="finishQuiz()">Finish Quiz</button>
      </div>
    </div>

  </div>
</div>

<div id="not-logged-in">
  <p>You must be logged in to view this page.</p>
  <a href="../Authentication/signup.html">Go to Login</a>
</div>

<script>
  // --- SUPABASE CLIENT INITIALIZATION ---
  const SUPABASE_URL = 'https://jzfkcapslrnctklvjlcf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6ZmtjYXBzbHJuY3RrbHZqbGNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDcxMDY0NDgsImV4cCI6MjA2MjY4MjQ0OH0.6iNWI1dOTCbZcyATzocIlzy5ojga8UMLdbM7Dp4mi7s'; 
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // --- AUTH CHECK ---
  client.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      document.getElementById('protected-content').style.display = 'block';
      document.getElementById('not-logged-in').style.display = 'none';
    } else {
      document.getElementById('protected-content').style.display = 'none';
      document.getElementById('not-logged-in').style.display = 'block';
    }
  });

  // --- LESSON TOGGLE ---
  function toggleVisibility(id) {
    const el = document.getElementById(id);
    if (el.style.display === "block") {
      el.style.display = "none";
    } else {
      el.style.display = "block";
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  // --- QUIZ TOGGLE ---
  function toggleQuizVisibility(id) {
    const el = document.getElementById(id);
    if (el.style.display === "none") {
      el.style.display = "block";
      initializeQuiz();
    } else {
      el.style.display = "none";
      resetQuiz();
    }
  }

  // --- QUIZ LOGIC ---
  let allQuestionIds = ['q1']; // Add q2-q8 IDs here
  let askedQuestions = [];
  let currentQuestionIndex = 0;
  let score = 0;
  const totalQuestionsToAsk = 5;

  function getRandomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function hideAllQuestions() {
    allQuestionIds.forEach(id => {
      const q = document.getElementById(id);
      if (q) q.style.display = 'none';
      const feedback = q.querySelector('.question-feedback');
      if (feedback) feedback.textContent = '';
      q.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
      q.querySelector('button').disabled = false;
    });
  }

  function initializeQuiz() {
    askedQuestions = [];
    score = 0;
    currentQuestionIndex = 0;
    document.getElementById('randombut').style.display = 'block';
    document.getElementById('finishButton').style.display = 'none';
    hideAllQuestions();
    showRandomQuestion();
  }

  function showRandomQuestion() {
    if (askedQuestions.length >= totalQuestionsToAsk) { finishQuiz(); return; }
    hideAllQuestions();
    const available = allQuestionIds.filter(id => !askedQuestions.includes(id));
    if (available.length === 0) { finishQuiz(); return; }
    const qid = available[getRandomInt(0, available.length-1)];
    document.getElementById(qid).style.display = 'block';
    askedQuestions.push(qid);
    currentQuestionIndex++;
    if (currentQuestionIndex >= totalQuestionsToAsk) {
      document.getElementById('randombut').style.display = 'none';
      document.getElementById('finishButton').style.display = 'block';
    }
  }

  function checkAnswer(qid) {
    const qDiv = document.getElementById(qid);
    const selected = qDiv.querySelector(`input[name="${qid}_radio"]:checked`);
    const feedback = qDiv.querySelector('.question-feedback');
    const correct = qDiv.dataset.answer;
    if (!selected) { feedback.textContent = 'Please select an answer.'; feedback.className='question-feedback incorrect'; return; }
    if (selected.value === correct) { feedback.textContent = 'Correct!'; feedback.className='question-feedback correct'; score++; }
    else { feedback.textContent = `Incorrect. Correct: ${correct.toUpperCase()}`; feedback.className='question-feedback incorrect'; }
    qDiv.querySelector('button').disabled = true;
  }

  function finishQuiz() {
    hideAllQuestions();
    document.getElementById('randombut').style.display = 'none';
    document.getElementById('finishButton').style.display = 'none';
    let scoreDiv = document.getElementById('quiz-score-display');
    if (!scoreDiv) { scoreDiv = document.createElement('div'); scoreDiv.id='quiz-score-display'; document.getElementById('quiz1questions').appendChild(scoreDiv); }
    scoreDiv.innerHTML = `<h3>Quiz Completed!</h3><p>You scored ${score} out of ${totalQuestionsToAsk} questions.</p>`;
    scoreDiv.style.display='block';
    updateUserPoints();
  }

  function resetQuiz() {
    askedQuestions = [];
    score = 0;
    currentQuestionIndex = 0;
    hideAllQuestions();
    const scoreDiv = document.getElementById('quiz-score-display'); if(scoreDiv) scoreDiv.style.display='none';
    document.getElementById('randombut').style.display='block';
    document.getElementById('finishButton').style.display='none';
  }

  // --- UPDATE USER POINTS ---
  async function updateUserPoints() {
    const { data: { user } } = await client.auth.getUser();
    if (!user || typeof score !== 'number') return;
    const { data: userData, error: fetchError } = await client.from('users').select('points').eq('id', user.id).single();
    if (fetchError && fetchError.code==='PGRST116') {
      await client.from('users').insert({ id:user.id, points:score, email:user.email });
      return;
    }
    const currentPoints = userData?.points || 0;
    const newPoints = currentPoints + score;
    await client.from('users').update({ points:newPoints }).eq('id', user.id);
  }

</script>

</body>
</html>

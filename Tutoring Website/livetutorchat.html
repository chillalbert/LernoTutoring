<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat With a Tutor</title>
</head>
<body style="background:#F9FBE7;">
  <h1 style="text-align: center; color: #0288D1">Chat With a Tutor</h1>

  <p id="signedinText" style="text-align: center; display: none; font-size: 18px; padding: 10px;"></p>

  <button
    id="notsignedinBtn"
    onclick="window.location.href='Authentication/signup.html'"
    style="width: 180px; height: 50px; font-size: 17px; color: yellow; background-color: #0288D1; display: none; margin: 0 auto;"
  >
    Sign Up to Chat
  </button>

  <!-- Load Supabase first -->
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://jzfkcapslrnctklvjlcf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6ZmtjYXBzbHJuY3RrbHZqbGNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDcxMDY0NDgsImV4cCI6MjA2MjY4MjQ0OH0.6iNWI1dOTCbZcyATzocIlzy5ojga8UMLdbM7Dp4mi7s'
    );

    const signedinText = document.getElementById("signedinText");
    const notsignedinBtn = document.getElementById("notsignedinBtn");

    async function updateUI(session) {
      if (session?.user?.email) {
        signedinText.textContent = `Welcome to the Chat with a Tutor page. In this page, you will be able to ask tutors help on specific math, ela, and science problems, and you will also be able to ask more questions about the service!`;
        signedinText.style.display = "block";
        notsignedinBtn.style.display = "none";

        // Inject Tawk.to only once
        if (!window.tawkInjected) {
          const s1 = document.createElement("script");
          s1.async = true;
          s1.src = "https://embed.tawk.to/682a357ca02ad619064ac0e4/1irie1rpg";
          s1.charset = "UTF-8";
          s1.setAttribute("crossorigin", "*");
          document.head.appendChild(s1);
          window.tawkInjected = true;
        }
      } else {
        signedinText.style.display = "none";
        notsignedinBtn.style.display = "block";
      }
    }

    // On load
    document.addEventListener("DOMContentLoaded", async () => {
      const { data: { session } } = await supabase.auth.getSession();
      updateUI(session);

      supabase.auth.onAuthStateChange((_event, session) => {
        updateUI(session);
      });
    });
  </script>
</body>
</html>
